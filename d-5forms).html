<html>
    <head>
        <title>input types</title>
    </head>
    <body>
        <h1>Form</h1>
        <form>
           <label for="Fname">First Name:</label>
            <input type="text" name="Fname" required><br/><br>
            <label for="Lname">Last Name:</label>
            <input type="text" name="Lname" required><br><br>
           <div> <label for="dob">Date Of Birth</label>
            <input type="date" name="dob" required><br><br>
            <label>Age</label>
            <input type="number" max="100" required><br><br>
        
            <label>Gender:</label>
            <select>
                <option>Male</option>
                <option>Female</option>
                <option>other</option>
            </select><br><br>
            <label>Email Address:</label>
            <input type="email" placeholder="Enter your email" required><br/><br>
            
            <label for="pa">Positions Available:</label>
            <input type="radio" name="pa">
            <label>Junior Developer</label>
            <input type="radio" name="pa">
            <label>Mid-level Developer</label>
            <input type="radio" name="pa" >
            <label>Senior Developer</label><br><br>
            <div>
            <label for="pl">Programming Languages:</label>
            <input type="checkbox" name="pl">
            <label>Java</label>
            <input type="checkbox" name="pl">
            <label>JavaScript</label>
            <input type="checkbox" name="pl">
            <label>Python</label><br><br>
            <label>Password:</label>
            <input type="password" maxlength="8" required>
            <label>Confirm Password</label>
            <input type="password" maxlength="8" required><br><br>

            <div>
            <label>Description:</label>
            <textarea placeholder="Write Something....."></textarea>

            <input type="file" name="file" accept="image/*"><br>
            <!-- <input type="tablet" name="tablet" accept="image/*"> -->

            <input type="Submit">
            <input type="Reset"><br><br>
