<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Code Challenge</title>
        <style>
            body {
                margin: 0;
                font-family: Arial;
                background: #04153F;
                position: relative;
            }

            .container {
                display: flex;
                height: 100vh;
            }

            .left,
            .right {
                width: 50%;
                padding: 20px;
                box-sizing: border-box;
                overflow: auto;
            }

            textarea {
                width: 90%;
                height: 65svh;
                font-family: monospace;
            }

            iframe {
                width: 100%;
                height: 300px;
                background: white;
                border: 1px solid #ccc;

            }
            .sec{
                height: 25px;
                background-color: #04153F;
                padding-bottom: 6px;
                display: flex;
                gap: 0px;
                
            }
            .button {
                color: white;
                font-weight: bold;
                width: 110px;
                height: 31px;
                margin-bottom: 20px;
                padding: 10px 15px;
                border: 1px solid gray;
                cursor: pointer;
                background: #1E006E;
            }
            .button:hover {
                color: white;
                background-image: linear-gradient(145deg, #00FFF7, #6E00FF);
                border: 0px;
            }
            .curr {
                border: 2px solid #00FFE1;
                background: #1E006E;
                color: #00FFE1;
            } 
            .hide {
                display: none;
            }
            textarea {
                padding: 10px;
                resize: none;
                border: 1px solid rgb(192, 188, 188);
                background-color: hsl(224, 82%, 12%);
                color: white;
                margin-bottom: 10px;
                font-size: 1rem;
            }
            textarea::placeholder {
                color: white;
            }
            .run{
                color: white;
                font-weight: bold;
                width: 110px;
                height: 31px;
                background:#1E006E ;
                border-radius: 8px;
                border: 1px solid #00FFE1;
            }
            .run:hover{
                background: linear-gradient(145deg, #00FFF7, #6E00FF);
                color: #04153F;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <!-- <div class="left">
                <h2>🔍 Your Output</h2>
                <iframe id="user-output"></iframe>
            </div> -->
            <div class="right">
                <h3 style="color:white">Code Editor</h3>
                <div class="sec">
                    <button
                        class="html button curr"
                        onclick="showHtml()"
                    >
                        HTML
                    </button>
                    <button
                        class="css button"
                        onclick="showCSS()"
                    >
                        CSS
                    </button>
                    <button
                        class="js button"
                        onclick="showJS()"
                    >
                        JS
                    </button>
                </div>
                <textarea
                    id="html-code"
                    placeholder="Write HTML here..."
                ></textarea>

                <textarea
                    id="css-code"
                    class="hide"
                    placeholder="Write CSS here..."
                ></textarea>

                <textarea
                    id="js-code"
                    class="hide"
                    placeholder="Write JS here..."
                ></textarea>
                <button onclick="runCode()" class="run">Run</button>
            </div>
        </div>

        <script>
            function showHtml() {
                const html = document.getElementById("html-code");
                const css = document.getElementById("css-code");
                const js = document.getElementById("js-code");
                if (!html.classList.contains("hide")) return;
                html.classList.remove("hide");
                css.classList.add("hide");
                js.classList.add("hide");
                const buttons = document.getElementsByClassName("button");
                buttons[0].classList.add("curr");
                buttons[1].classList.remove("curr");
                buttons[2].classList.remove("curr");
            }
            function showCSS() {
                const html = document.getElementById("html-code");
                const css = document.getElementById("css-code");
                const js = document.getElementById("js-code");
                if (!css.classList.contains("hide")) return;
                css.classList.remove("hide");
                html.classList.add("hide");
                js.classList.add("hide");
                const buttons = document.getElementsByClassName("button");
                buttons[1].classList.add("curr");
                buttons[0].classList.remove("curr");
                buttons[2].classList.remove("curr");
            }
            function showJS() {
                const html = document.getElementById("html-code");
                const css = document.getElementById("css-code");
                const js = document.getElementById("js-code");
                if (!js.classList.contains("hide")) return;
                js.classList.remove("hide");
                css.classList.add("hide");
                html.classList.add("hide");
                const buttons = document.getElementsByClassName("button");
                buttons[2].classList.add("curr");
                buttons[0].classList.remove("curr");
                buttons[1].classList.remove("curr");
            }
            function runCode() {
                const html = document.getElementById("html-code").value;
                const css = document.getElementById("css-code").value;
                const js = document.getElementById("js-code").value;

                const userCode = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>${css}</style>
                </head>
                <body>
                    ${html}
                    <script>
                        ${js.replace(/<\/script>/g, "<\\/script>")}
                    <\/script>
                </body>
                </html>
            `;

                const iframe = document.getElementById("user-output");
                iframe.srcdoc = userCode;
            }
        </script>
    </body>
</html>
